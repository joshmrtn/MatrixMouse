# docker-compose.yml
# MatrixMouse deployment
#
# Prerequisites:
#   1. Copy .matrixmouse/config.toml.example to .matrixmouse/config.toml and configure
#   2. Build images: docker compose build
#   3. Start test runner on host: ./test_runner.sh &
#   4. Start services: docker compose up -d
#
# The test_runner.sh script runs on the HOST (not in a container).
# It listens for test requests from the agent and runs them in isolated
# temporary containers. See test_runner.sh for configuration.

services:

  matrixmouse:
    build:
      context: .
      dockerfile: Dockerfile
    image: matrixmouse
    restart: unless-stopped

    volumes:
      # The repository the agent works on
      - ${WORKSPACE_PATH:?WORKSPACE_PATH must be set}:/workspace

      # FIFO pipes — created by test_runner.sh on the host
      # Must match FIFO_DIR in test_runner.sh
      - /tmp/matrixmouse-pipes:/run/matrixmouse-pipes

      # Agent config and runtime state
      # The .matrixmouse/ directory inside the workspace is used by the agent.
      # No separate mount needed — it lives inside /workspace.

    environment:
      # Tell the agent where to find its workspace
      - WORKSPACE=/workspace
      # Tell test_tools.py where to find the FIFOs
      - MM_FIFO_DIR=/run/matrixmouse-pipes
      # Ollama endpoint — set to host.docker.internal if Ollama runs on the host
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # Optional: increase test timeout for slow test suites
      - MM_TEST_TIMEOUT=360

    # Expose web UI to nginx only — not directly to the host network
    expose:
      - "8080"

    networks:
      - internal

    # Allow the agent to reach Ollama on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Resource limits — adjust based on your server
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Authelia forward auth socket (if using Authelia)
      # - authelia_data:/var/run/authelia:ro

    networks:
      - internal

    depends_on:
      - matrixmouse

networks:
  internal:
    driver: bridge
    # No external connectivity for the internal network —
    # only nginx is exposed to the outside world
    internal: false   # set to true to fully isolate if nginx handles all external traffic


# ---------------------------------------------------------------------------
# nginx configuration note:
#
# Create nginx/nginx.conf with:
#   - HTTPS termination (certs in nginx/certs/)
#   - Proxy pass to matrixmouse:7654
#   - auth_basic or Authelia forward auth
#   - Websocket upgrade headers for /ws
#
# Minimal websocket-aware proxy block:
#
#   location / {
#       proxy_pass http://matrixmouse:8080;
#       proxy_http_version 1.1;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection "upgrade";
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#
#       # Authelia forward auth (uncomment when ready):
#       # auth_request /authelia;
#   }
# ---------------------------------------------------------------------------
